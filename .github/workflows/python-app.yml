name: Run pipeline and Upload LMDB (raw tar)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install lmdb pillow opencv-python fonttools

      # ✅ 跑你的脚本
      - name: Run pipeline
        run: |
          bash DiffuFont/1.sh

      - name: Show outputs
        run: |
          find DiffuFont/DataPreparation -maxdepth 3 -type d -print || true

      # ✅ 打包 LMDB（不压缩）
      - name: Pack LMDB (raw tar)
        run: |
          mkdir -p release_files

          tar -cvf release_files/LMDB.tar DiffuFont/DataPreparation/LMDB

          if [ -d "DiffuFont/DataPreparation/PartBank" ]; then
            tar -cvf release_files/PartBank.tar DiffuFont/DataPreparation/PartBank
          fi

          ls -lh release_files

      # ✅ 生成 tag
      - name: Prepare tag
        id: tag
        run: |
          TAG="lmdb-$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ✅ 上传到 Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            release_files/*.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
