name: Run Python and Upload LMDB Artifacts

on:
  workflow_dispatch:

jobs:
  run-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install lmdb pillow opencv-python fonttools

      - name: Run pipeline
        run: |
          bash DiffuFont/1.sh
          ls -la DiffuFont/DataPreparation/LMDB || true

      # 1) 打包 LMDB（注意：LMDB 往往是目录）
      - name: Pack LMDB outputs
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

          mkdir -p artifacts
          tar -C DiffuFont -cf - DataPreparation/LMDB | zstd -T0 -19 -o artifacts/LMDB.tar.zst

          # 可选：也单独打包 PartBank 之类
          if [ -d "DiffuFont/DataPreparation/PartBank" ]; then
            tar -C DiffuFont -cf - DataPreparation/PartBank | zstd -T0 -19 -o artifacts/PartBank.tar.zst
          fi

          ls -lh artifacts

      # 2) 上传到 Actions Artifacts（不会进 git）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diffufont-lmdb
          path: artifacts/*
          retention-days: 7
